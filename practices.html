<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Practice schedules · Brown Softball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="practices">

<div class="app">

  <div class="topbar">
    <a href="index.html" class="brand">
      <div class="brand-mark">B</div>
      <div>
        <div class="brand-name">Brown Softball</div>
        <div class="brand-sub">Spring 2026</div>
      </div>
    </a>
    <div class="me">?</div>
  </div>

  <div class="page-title-block">
    <a href="index.html" class="crumb">← Menu</a>
    <div class="page-title">Practice schedules</div>
    <div class="page-sub" id="practices-sub">Team practices and the next lineup</div>
  </div>

  <div id="schedule-slot"></div>
  <div id="lineup-host"></div>
</div>

<!-- Modal: schedule team practice -->
<div class="modal-backdrop" id="practice-modal">
  <div class="modal">
    <div class="modal-title">Schedule a team practice</div>
    <div class="modal-sub">Set a time and the team will RSVP</div>

    <form id="practice-form">
      <div class="field-row">
        <div class="field">
          <div class="field-label">Day</div>
          <select name="day" required>
            <option value="Mon-9">Mon 09</option>
            <option value="Tue-10">Tue 10</option>
            <option value="Wed-11">Wed 11</option>
            <option value="Thu-12">Thu 12</option>
            <option value="Fri-13">Fri 13</option>
            <option value="Sat-14" selected>Sat 14</option>
            <option value="Sun-15">Sun 15</option>
          </select>
        </div>
        <div class="field">
          <div class="field-label">Time</div>
          <select name="time" required>
            <option>8 AM</option>
            <option>9 AM</option>
            <option selected>10 AM</option>
            <option>11 AM</option>
            <option>5 PM</option>
            <option>6 PM</option>
          </select>
        </div>
      </div>

      <div class="field">
        <div class="field-label">Title</div>
        <input type="text" name="title" placeholder="Field practice, scrimmage, cage work..." />
      </div>

      <div class="field">
        <div class="field-label">Where</div>
        <input type="text" name="location" placeholder="Aldrich Field, 5th & Pine cages..." />
      </div>

      <div class="field">
        <div class="field-label">Spots</div>
        <div class="capacity-row">
          <input type="number" name="capacity" value="15" min="1" max="100" />
          <button type="button" class="cap-toggle active"><span class="inf">∞</span> Unlimited</button>
        </div>
      </div>

      <div class="field">
        <label class="check-row" for="practice-required">
          <input type="checkbox" name="required" id="practice-required" />
          <span class="check-box"></span>
          <div>
            <div class="check-label">Mark as required</div>
            <div class="check-desc">Players who can't make it must give a public reason</div>
          </div>
        </label>
      </div>

      <div class="modal-actions">
        <button type="button" id="practice-cancel">Cancel</button>
        <button type="submit" class="primary">Schedule it</button>
      </div>
    </form>
  </div>
</div>

<div class="tabbar">
  <a class="tab" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </a>
  <a class="tab" href="messages.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Chat
  </a>
  <a class="tab active" href="practices.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Practice
  </a>
  <a class="tab" href="calendars.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Cal
  </a>
</div>

<script src="app.js"></script>
</body>
</html>

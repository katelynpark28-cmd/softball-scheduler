<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages · Brown Softball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="messages">

<div class="app">

  <div class="topbar">
    <a href="index.html" class="brand">
      <div class="brand-mark">B</div>
      <div>
        <div class="brand-name">Brown Softball</div>
        <div class="brand-sub">Spring 2026</div>
      </div>
    </a>
    <div class="me">?</div>
  </div>

  <div class="page-title-block" id="msg-header">
    <a href="index.html" class="crumb" id="msg-crumb">← Menu</a>
    <div class="page-title" id="msg-title">Direct messages</div>
    <div class="page-sub" id="msg-sub">Talk privately with a coach</div>
  </div>

  <!-- Conversation list (shown when no ?with= in URL) -->
  <div id="conv-list" class="menu"></div>

  <!-- Conversation view (shown when ?with=USER_ID in URL) -->
  <div id="messages" class="messages" style="display:none"></div>
</div>

<!-- Composer only shows in conversation view -->
<div class="composer" id="composer" style="display:none">
  <input type="text" id="msg-input" placeholder="Send a message..." autocomplete="off" />
  <button id="msg-send" aria-label="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12l18-9-7 18-2-7-9-2z"/>
    </svg>
  </button>
</div>

<div class="tabbar">
  <a class="tab" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </a>
  <a class="tab active" href="messages.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    DMs
  </a>
  <a class="tab" href="practices.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Practice
  </a>
  <a class="tab" href="calendars.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Cal
  </a>
</div>

<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendars · Brown Softball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="calendars">

<div class="app">

  <div class="topbar">
    <a href="index.html" class="brand">
      <div class="brand-mark">B</div>
      <div>
        <div class="brand-name">Brown Softball</div>
        <div class="brand-sub">Spring 2026</div>
      </div>
    </a>
    <div class="me">?</div>
  </div>

  <div class="page-title-block">
    <a href="index.html" class="crumb">← Menu</a>
    <div class="page-title">Calendars</div>
    <div class="page-sub">When players and coaches are free — darker = more people</div>
  </div>

  <!-- Add my availability -->
  <button class="post-btn" id="compose-btn" style="margin-bottom:14px">
    <span class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
    <span id="compose-label">When can you hit?</span>
  </button>

  <div class="role-toggle">
    <button class="active" data-role="players">Players</button>
    <button data-role="coaches">Coaches</button>
  </div>

  <div class="heatmap">
    <div class="heatmap-grid" id="heatmap"></div>
    <div class="hm-legend">
      <span>This week</span>
      <div class="hm-scale">
        <span>fewer</span>
        <div class="sw" style="background:var(--bg-2)"></div>
        <div class="sw" style="background:var(--brown-lt)"></div>
        <div class="sw" style="background:#d8c6a8"></div>
        <div class="sw" style="background:#b39668"></div>
        <div class="sw" style="background:var(--brown-2)"></div>
        <div class="sw" style="background:var(--brown)"></div>
        <span>more</span>
      </div>
    </div>
  </div>
</div>

<!-- Availability editor modal -->
<div class="modal-backdrop" id="avail-modal"></div>

<div class="tabbar">
  <a class="tab" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    Home
  </a>
  <a class="tab" href="messages.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Chat
  </a>
  <a class="tab" href="practices.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Practice
  </a>
  <a class="tab active" href="calendars.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Cal
  </a>
</div>

<script src="app.js"></script>
</body>
</html>
